<div class="flex flex-col h-screen">

  <!-- Header -->
  <div class="p-4 bg-white shadow flex justify-between items-center">

    <div class="flex items-start gap-3">

      <!-- Icon -->
      <div class="text-xl">
        📄
      </div>

      <!-- Text -->
      <div>

        <div class="font-semibold text-lg">
          Smart Document Analyzer
        </div>

        <div *ngIf="selectedDocName"
             class="text-sm text-gray-500">
          Name: {{ selectedDocName }}
        </div>

        <div *ngIf="selectedDocId"
             class="text-xs text-gray-400">
          ID: {{ selectedDocId }}
        </div>

        <div *ngIf="!selectedDocId"
             class="text-sm text-red-500">
          ⚠️ No document selected
        </div>

      </div>

    </div>

    <!-- Clear -->
    <button *ngIf="selectedDocId"
            (click)="clearSelection()"
            class="bg-red-500 text-white px-3 py-1 rounded text-sm">
      Clear
    </button>

  </div>

  <!-- Messages -->
  <div #chatContainer class="flex-1 overflow-auto p-6 space-y-4">

    <!-- Empty -->
    <div *ngIf="messages.length === 0 && selectedDocId"
         class="text-gray-400 text-center mt-10">
      Ask something about your document 👇
    </div>

    <div *ngIf="!selectedDocId" class="text-red-400 text-center mt-10">
      📄 Please select a document from left
    </div>

    <!-- Chat -->
    <div *ngFor="let msg of messages" class="mb-3">

      <div [ngClass]="{'text-right': msg.role === 'user', 'text-left': msg.role === 'ai'}">

        <!-- Message -->
        <div class="inline-block px-3 py-2 rounded-lg"
             [ngClass]="{'bg-blue-500 text-white': msg.role === 'user', 'bg-gray-200 text-black shadow w-full max-w-3xl text-sm leading-relaxed': msg.role === 'ai'}">
          <span *ngIf="msg.role === 'ai'">🤖</span> {{ msg.message }}
        </div>

        <!-- Time -->
        <div *ngIf="msg.createdAt" class="text-xs text-gray-400 mt-1">
          {{ msg.createdAt | date:'EEEE, dd MMMM, hh:mm a' }}
        </div>

      </div>

    </div>

    <!-- Loader -->
    <div *ngIf="loading" class="flex items-center gap-2 text-gray-500">
      🤖
      <div class="flex gap-1">
        <span class="w-2 h-2 bg-gray-400 rounded-full animate-bounce"></span>
        <span class="w-2 h-2 bg-gray-400 rounded-full animate-bounce delay-150"></span>
        <span class="w-2 h-2 bg-gray-400 rounded-full animate-bounce delay-300"></span>
      </div>
    </div>

  </div>

  <!-- Input -->
  <div class="p-4 bg-white border-t flex gap-2">

    <input [(ngModel)]="question"
           [disabled]="loading || !selectedDocId"
           (keyup.enter)="send()"
           class="flex-1 border rounded px-3 py-2"
           placeholder="Ask about your document..." />

    <button (click)="send()"
            [disabled]="loading || !selectedDocId || !question"
            class="bg-blue-500 text-white px-4 py-2 rounded disabled:bg-gray-400">
      Send
    </button>

  </div>

</div>
